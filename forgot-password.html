<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Forgot Password - Umbrella Corporation</title>
    <style>
        .forgot-password-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            padding: 20px;
        }
        .forgot-password-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff9c;
            padding: 40px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
        }
        .forgot-password-box h1 {
            color: #00ff9c;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .forgot-password-box p {
            color: #ccc;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .forgot-password-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00ff9c;
            color: #fff;
            border-radius: 4px;
        }
        .forgot-password-box input::placeholder {
            color: #00ff9c;
        }
        .forgot-password-box button {
            width: 100%;
            padding: 10px;
            background: #00ff9c;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .forgot-password-box button:hover {
            background: #00cc7f;
        }
        .forgot-password-box a {
            color: #00ff9c;
            text-decoration: none;
        }
        .forgot-password-box a:hover {
            text-decoration: underline;
        }
        .message {
            color: #00ff9c;
            text-align: center;
            margin-top: 20px;
        }
        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <div class="forgot-password-box">
            <h1>Password Reset</h1>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            
            <div id="resetForm">
                <input type="email" id="resetEmail" placeholder="Enter your email" required>
                <button onclick="requestReset()">Send Reset Link</button>
                <p style="text-align: center; margin-top: 15px;"><a href="index.html">Back to Sign In</a></p>
            </div>
            
            <div id="resetMessage" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://umbrella-corporation-project-production.up.railway.app";
        
        async function requestReset() {
            const email = document.getElementById("resetEmail").value.trim();
            
            if (!email) {
                alert("Please enter your email");
                return;
            }

            try {
                    const response = await fetch(`${API_BASE_URL}/api/request-reset`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                const messageDiv = document.getElementById("resetMessage");
                messageDiv.style.display = "block";

                if (!response.ok) {
                    messageDiv.innerHTML = `
                        <p class="error">${data.error || "Unable to send reset email."}</p>
                        <p style="text-align: center; margin-top: 15px;"><a href="forgot-password.html">Try again</a></p>
                    `;
                    return;
                }

                document.getElementById("resetForm").style.display = "none";
                messageDiv.innerHTML = `
                    <p class="message">Check your email for a password reset link. It expires in 1 hour.</p>
                    <p style="text-align: center; margin-top: 15px;"><a href="index.html">Back to Sign In</a></p>
                `;
            } catch (err) {
                alert("Connection error: " + err.message);
            }
        }

        // Allow Enter key
        document.getElementById("resetEmail").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                requestReset();
            }
        });
    </script>
</body>
</html>
