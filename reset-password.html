<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Reset Password - Umbrella Corporation</title>
    <style>
        .reset-password-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            padding: 20px;
        }
        .reset-password-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff9c;
            padding: 40px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
        }
        .reset-password-box h1 {
            color: #00ff9c;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .reset-password-box p {
            color: #ccc;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .reset-password-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00ff9c;
            color: #fff;
            border-radius: 4px;
        }
        .reset-password-box input::placeholder {
            color: #00ff9c;
        }
        .reset-password-box button {
            width: 100%;
            padding: 10px;
            background: #00ff9c;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .reset-password-box button:hover {
            background: #00cc7f;
        }
        .reset-password-box a {
            color: #00ff9c;
            text-decoration: none;
        }
        .reset-password-box a:hover {
            text-decoration: underline;
        }
        .message {
            color: #00ff9c;
            text-align: center;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="reset-password-container">
        <div class="reset-password-box">
            <h1>Reset Password</h1>
            <p>Enter your new password below.</p>
            
            <div id="resetForm">
                <input type="password" id="newPassword" placeholder="New password" required>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                <button onclick="resetPassword()">Reset Password</button>
            </div>
            
            <div id="resetMessage" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://umbrella-corporation-project-production.up.railway.app";
        
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        if (!token) {
            document.getElementById("resetForm").style.display = "none";
            document.getElementById("resetMessage").innerHTML = `
                <p class="error">Invalid or missing reset link. <a href="forgot-password.html">Request a new one</a></p>
            `;
            document.getElementById("resetMessage").style.display = "block";
        }

        async function resetPassword() {
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            
            if (!newPassword || !confirmPassword) {
                alert("Please fill in all fields");
                return;
            }

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            if (newPassword.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/reset-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await response.json();
                const messageDiv = document.getElementById("resetMessage");
                messageDiv.style.display = "block";

                if (!response.ok) {
                    document.getElementById("resetForm").style.display = "none";
                    messageDiv.innerHTML = `
                        <p class="error">${data.error || "Unable to reset password."} <a href="forgot-password.html">Request a new reset link</a></p>
                    `;
                    return;
                }

                document.getElementById("resetForm").style.display = "none";
                messageDiv.innerHTML = `
                    <p class="message">Password reset successful!</p>
                    <p style="text-align: center; margin-top: 15px;"><a href="index.html">Back to Sign In</a></p>
                `;
            } catch (err) {
                document.getElementById("resetMessage").innerHTML = `
                    <p class="error">Connection error: ${err.message}</p>
                    <p style="text-align: center; margin-top: 15px;"><a href="forgot-password.html">Try again</a></p>
                `;
                document.getElementById("resetMessage").style.display = "block";
            }
        }

        // Allow Enter key
        document.getElementById("newPassword")?.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                resetPassword();
            }
        });
        document.getElementById("confirmPassword")?.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                resetPassword();
            }
        });
    </script>
</body>
</html>
